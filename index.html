<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ritual Semanal — Skincare App</title>
<meta name="description" content="App semanal de skincare com rotina tratativa, modo sensível por dia, checklist e ferramentas integradas.">
<meta name="theme-color" content="#4B0D17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ritual">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500;6..96,600;6..96,700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --mustard:#CDA04A;
  --burnt:#C4683C;
  --brick:#933347;
  --oxblood:#5A2235;
  --burgundy:#72314A;
  --olive:#69724A;
  --forest:#285349;
  --teal:#326A63;
  --aubergine:#5A406B;
  --camel:#BF8C63;
  --copper:#BB6B43;
  --espresso:#25171C;
  --cream:#F8EFE6;
  --cream2:#FFF9F2;
  --ink:#2A1B21;
  --ink-soft:#5C4443;
  --ink-mute:#8B716C;
  --paper:rgba(255,250,244,.84);
  --paper-strong:rgba(255,250,245,.94);
  --hairline:rgba(90,34,53,.12);
  --display:"Bodoni Moda", "Cormorant Garamond", serif;
  --serif:"Cormorant Garamond", "Times New Roman", serif;
  --sans:"Outfit", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --shadow-soft:0 1px 0 rgba(255,255,255,.74) inset, 0 22px 52px -38px rgba(90,34,53,.26), 0 12px 24px -18px rgba(37,23,28,.12);
  --shadow-deep:0 1px 0 rgba(255,255,255,.86) inset, 0 34px 78px -50px rgba(90,34,53,.38), 0 16px 30px -22px rgba(37,23,28,.16);
  --glow:0 0 0 1px rgba(255,255,255,.24) inset, 0 0 22px rgba(205,160,74,.08);
}
*{box-sizing:border-box}
html,body{margin:0;max-width:100%;overflow-x:hidden}
body{
  min-height:100dvh;
  color:var(--ink);
  font-family:var(--sans);
  background:
    radial-gradient(720px 480px at 12% 2%, rgba(205,160,74,.11), transparent 62%),
    radial-gradient(820px 620px at 100% 10%, rgba(114,49,74,.08), transparent 58%),
    radial-gradient(540px 420px at -10% 48%, rgba(40,83,73,.05), transparent 64%),
    radial-gradient(620px 420px at 94% 82%, rgba(187,107,67,.08), transparent 60%),
    linear-gradient(180deg,#F6EEE4 0%,#F3E7D9 52%,#EFE1D2 100%);
  background-attachment:fixed;
  padding:0 clamp(14px,4.6vw,22px) calc(96px + env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
body::before{
  content:"";
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320' viewBox='0 0 320 320'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='2' stitchTiles='stitch' seed='8'/><feColorMatrix values='0 0 0 0 0.18 0 0 0 0 0.10 0 0 0 0 0.06 0 0 0 0.10 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='.42'/><g stroke='%235A2235' stroke-opacity='.08' fill='none'><circle cx='258' cy='56' r='28'/><circle cx='258' cy='56' r='14'/><path d='M258 16v10M258 86v10M218 56h10M288 56h10M230 28l8 8M286 84l8 8M286 28l-8 8M238 84l-8 8'/></g></svg>");
  mix-blend-mode:multiply;
  opacity:.30;
}
button,input,textarea{font:inherit;color:inherit}
button{border:0;background:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
.app{width:100%;max-width:760px;margin:0 auto;position:relative;z-index:1}
.app-head{
  padding:26px 0 16px;
  position:relative;
}
.app-head::before{
  content:"";
  position:absolute; inset:8px 0 0;
  background:
    radial-gradient(420px 180px at 10% 0%, rgba(242,206,146,.10), transparent 58%),
    linear-gradient(135deg, rgba(87,34,53,.96), rgba(99,54,77,.92));
  border:1px solid rgba(255,255,255,.18);
  box-shadow:var(--shadow-deep), var(--glow);
  border-radius:40px 56px 36px 60px / 30px 42px 58px 34px;
  z-index:-1;
}
.app-head::after{
  content:"";
  position:absolute; inset:10px 2px 2px;
  border:1px solid rgba(255,245,233,.18);
  border-radius:38px 54px 34px 58px / 28px 40px 54px 34px;
  pointer-events:none;
}
.topline{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  align-items:start;
  gap:18px;
  padding:18px 16px 0;
}
.titleblock{min-width:0}
.kicker{font-size:10px;letter-spacing:.42em;text-transform:uppercase;color:#E6C57A;font-weight:800;margin-bottom:12px;text-shadow:0 1px 0 rgba(0,0,0,.12)}
h1{margin:0;font-family:var(--display);font-weight:600;letter-spacing:-.05em;font-size:clamp(40px,10.2vw,72px);line-height:.88;color:#FFF3E5;text-shadow:0 8px 30px rgba(44,24,33,.18);display:flex;flex-direction:column;max-width:100%}
h1 span{display:block}
.sensitive-toggle{
  flex:none; display:inline-flex; align-items:center; gap:10px;
  padding:12px 14px 12px 12px; min-height:48px;
  border-radius:999px;
  background:rgba(255,248,238,.84);
  border:1px solid rgba(255,255,255,.28);
  box-shadow:var(--shadow-soft);
  color:var(--ink-soft); font-size:12px; font-weight:900; text-transform:uppercase; letter-spacing:.1em;
  transition:.25s ease;
  white-space:nowrap;
}
.track{width:40px;height:23px;border-radius:999px;background:rgba(82,58,35,.18);position:relative;transition:.25s;flex:none;box-shadow:inset 0 2px 4px rgba(37,23,28,.08)}
.track::after{content:"";position:absolute;width:17px;height:17px;left:3px;top:3px;border-radius:50%;background:#FFF8EE;box-shadow:0 2px 8px rgba(37,23,28,.16);transition:.25s}
.sensitive-toggle.on{background:linear-gradient(135deg,rgba(90,34,53,.98),rgba(114,49,74,.95));color:var(--cream);border-color:rgba(255,255,255,.10)}
.sensitive-toggle.on .track{background:rgba(255,248,238,.28)}
.sensitive-toggle.on .track::after{left:20px;background:var(--cream2)}
.sensitive-note{display:none;margin:16px 14px 0;padding:14px 16px;border-radius:20px 26px 18px 24px / 18px 22px 24px 20px;background:linear-gradient(135deg,rgba(90,34,53,.96),rgba(40,83,73,.88));color:var(--cream);font-size:13px;line-height:1.5;box-shadow:var(--shadow-soft)}
.sensitive-note.show{display:block}
.weeknav{
  position:sticky; top:0; z-index:20;
  margin:12px calc(-1 * clamp(14px,4.6vw,22px)) 18px;
  padding:12px clamp(14px,4.6vw,22px);
  backdrop-filter:blur(16px);
  background:linear-gradient(180deg, rgba(248,239,229,.88), rgba(248,239,229,.70));
  border-bottom:1px solid rgba(255,255,255,.24);
}
.days{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}
.daybtn{
  min-height:54px;border-radius:26px 20px 28px 22px / 22px 28px 20px 26px;padding:8px 2px;
  background:rgba(255,250,244,.92);border:1px solid rgba(255,255,255,.30);
  box-shadow:0 1px 0 rgba(255,255,255,.72) inset,0 18px 30px -24px rgba(90,34,53,.30);
  font-size:13px;font-weight:900;color:var(--ink-soft);position:relative;transition:.22s ease
}
.daybtn .dot{display:block;width:6px;height:6px;border-radius:50%;background:transparent;margin:5px auto 0;transition:.22s}
.daybtn.active{background:linear-gradient(145deg,rgba(106,34,67,.98),rgba(90,34,53,.96));color:var(--cream);transform:translateY(-2px) scale(1.01);box-shadow:var(--shadow-deep)}
.daybtn.active .dot{background:var(--mustard);box-shadow:0 0 0 6px rgba(205,160,74,.18)}
.daybtn.sens:not(.active)::after{content:"";position:absolute;right:8px;top:8px;width:7px;height:7px;border-radius:50%;background:var(--brick);box-shadow:0 0 0 3px rgba(147,51,71,.12)}
.panel{
  background:var(--paper);
  border:1px solid rgba(255,255,255,.28);
  box-shadow:var(--shadow-soft), var(--glow);
  backdrop-filter:blur(12px);
  border-radius:34px 44px 30px 48px / 30px 38px 48px 34px;
  padding:18px; margin:0 0 16px; overflow:visible;
}
.day-summary{padding:24px 22px;background:linear-gradient(180deg, rgba(255,251,246,.92), rgba(252,246,238,.82));}
.summary-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
.dayname{font-family:var(--display);font-size:clamp(34px,8.2vw,52px);line-height:.92;margin:0;letter-spacing:-.04em;font-weight:600;color:var(--oxblood)}
.mode-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.78);color:var(--ink-soft);font-size:10px;text-transform:uppercase;letter-spacing:.13em;font-weight:900;white-space:nowrap;box-shadow:inset 0 1px 0 rgba(255,255,255,.78)}
.mode-pill::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--forest)}
.mode-pill.high::before{background:var(--brick)}
.mode-pill.mid::before{background:var(--copper)}
.mode-pill.light::before{background:var(--olive)}
.focusline{font-size:15px;line-height:1.6;margin:0 0 16px;color:var(--ink-soft);max-width:54ch}
.goalchips,.toolchips,.chips,.mini{display:flex;flex-wrap:wrap;gap:8px;min-width:0;max-width:100%;overflow:visible}
.goalchips,.toolchips{margin:0 0 14px}
.goalchip,.toolchip,.chip{
  display:inline-flex; align-items:center; gap:6px; max-width:100%;
  padding:7px 10px; border-radius:999px; line-height:1.15;
  white-space:normal; overflow-wrap:anywhere; word-break:break-word; text-align:left; flex:0 1 auto;
}
.goalchip{font-size:10px;font-weight:900;letter-spacing:.11em;text-transform:uppercase;color:var(--oxblood);background:rgba(147,51,71,.08);border:1px solid rgba(147,51,71,.08)}
.toolchip{font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--forest);background:rgba(40,83,73,.10)}
.goalchip::before,.toolchip::before,.chip::before{content:"";width:6px;height:6px;border-radius:50%;flex:none;background:currentColor;opacity:.7}
.conflict{display:flex;gap:10px;align-items:flex-start;background:rgba(255,255,255,.78);border:1px solid var(--hairline);border-radius:20px 26px 18px 26px / 18px 24px 22px 20px;padding:14px;color:var(--ink-soft);font-size:12.6px;line-height:1.56;box-shadow:inset 0 1px 0 rgba(255,255,255,.8)}
.orb{width:11px;height:11px;border-radius:50%;background:var(--copper);margin-top:4px;flex:none;box-shadow:0 0 0 6px rgba(187,107,67,.12)}
.progress-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-top:18px}
.progressbar{height:8px;background:rgba(92,68,67,.12);border-radius:999px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(37,23,28,.06)}
.progressbar span{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--teal),var(--copper),var(--oxblood));border-radius:999px;transition:.35s ease}
.progress-text{font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-mute);white-space:nowrap}
.skinstate{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin:12px 0 18px}
.statebtn{border-radius:20px 14px 22px 16px / 16px 22px 14px 20px;min-height:42px;padding:8px 6px;background:rgba(255,250,244,.84);border:1px solid rgba(255,255,255,.24);box-shadow:0 1px 0 rgba(255,255,255,.62) inset;color:var(--ink-soft);font-size:11px;font-weight:900;letter-spacing:.04em;transition:.22s}
.statebtn.active{background:linear-gradient(135deg,rgba(106,34,67,.98),rgba(90,34,53,.95));color:var(--cream);box-shadow:var(--shadow-soft)}
.section{margin-top:23px}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:0 6px 14px}
.section-head h2{margin:0;font-family:var(--display);font-size:32px;line-height:.96;font-weight:600;letter-spacing:-.035em;color:var(--oxblood)}
.section-head p{margin:7px 0 0;color:var(--ink-soft);font-size:13px;line-height:1.45}
.section-badge{display:inline-flex;align-items:center;gap:6px;flex:none;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.13em;color:var(--copper);background:rgba(255,250,244,.88);padding:8px 11px;border-radius:999px;border:1px solid var(--hairline);white-space:nowrap}
.section-badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.7}
.card-stack{display:grid;gap:14px}
.step-card{position:relative;background:linear-gradient(180deg,rgba(255,252,247,.92),rgba(251,244,236,.84));border:1px solid rgba(255,255,255,.28);box-shadow:var(--shadow-soft),var(--glow);backdrop-filter:blur(10px);border-radius:28px 36px 24px 40px / 24px 30px 38px 28px;padding:18px 18px 16px;overflow:visible;transition:.22s ease;cursor:pointer}
.step-card:nth-child(even){border-radius:36px 26px 40px 24px / 30px 38px 24px 34px}
.step-card.tool{background:linear-gradient(145deg,rgba(251,247,240,.94),rgba(243,238,228,.84));border-color:rgba(40,83,73,.11)}
.step-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-deep),var(--glow)}
.step-card.done{background:linear-gradient(180deg,rgba(253,248,242,.96),rgba(246,239,230,.88))}
.card-main{display:grid;grid-template-columns:42px minmax(0,1fr);gap:14px;align-items:start}
.check{width:39px;height:39px;border-radius:16px 12px 18px 14px / 18px 14px 16px 12px;background:rgba(255,255,255,.70);box-shadow:inset 0 0 0 1px rgba(92,68,67,.14),0 10px 18px -16px rgba(37,23,28,.18);display:grid;place-items:center;transition:.2s;margin-top:2px;flex:none}
.check::before{content:"";width:14px;height:14px;border-radius:50%;border:2px solid rgba(92,68,67,.34);transition:.2s}
.step-card.done .check{background:linear-gradient(135deg,var(--teal),var(--forest));box-shadow:0 12px 22px -16px rgba(40,83,73,.42)}
.step-card.done .check::before{width:17px;height:10px;border:0;border-left:3px solid var(--cream);border-bottom:3px solid var(--cream);border-radius:0;transform:rotate(-45deg);margin-top:-4px}
.step-content{min-width:0;overflow:visible}
.step-top{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:start;margin-bottom:12px;min-width:0;overflow:visible}
.step-meta{display:flex;align-items:center;gap:8px;min-width:0}
.step-num{display:inline-grid;place-items:center;min-width:32px;height:32px;border-radius:14px;background:linear-gradient(135deg,rgba(106,34,67,.98),rgba(90,34,53,.95));color:var(--cream);font-size:12px;font-weight:900;letter-spacing:.05em;line-height:1;flex:none;box-shadow:0 8px 18px -12px rgba(90,34,53,.44)}
.step-kind{font-size:10px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute);line-height:1.28;white-space:normal;overflow-wrap:anywhere;min-width:0}
.chips{justify-content:flex-end;align-content:flex-start}
.chip{font-size:9px;font-weight:900;letter-spacing:.06em;text-transform:uppercase}
.chip.fps{background:rgba(205,160,74,.16);color:#7B5A18}
.chip.barreira{background:rgba(40,83,73,.11);color:var(--forest)}
.chip.ativo{background:rgba(147,51,71,.10);color:var(--brick)}
.chip.olhos{background:rgba(90,64,107,.10);color:var(--aubergine)}
.chip.zt{background:rgba(187,107,67,.12);color:#8C4B21}
.chip.pontual{background:rgba(90,34,53,.10);color:var(--oxblood)}
.chip.vico{background:rgba(191,140,99,.18);color:#70401f}
.chip.ferramenta{background:rgba(40,83,73,.10);color:var(--forest)}
.chip.opcional{background:rgba(139,113,108,.12);color:var(--ink-mute)}
.product{margin:0 0 9px;font-family:var(--serif);font-size:clamp(23px,6vw,32px);font-weight:600;line-height:1.08;letter-spacing:-.015em;color:var(--oxblood);overflow-wrap:anywhere}
.goal{margin:0 0 13px;color:var(--ink-soft);font-size:13.5px;line-height:1.55;max-width:60ch}
.detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:12px}
.detail{min-width:0;border-radius:16px 20px 14px 18px / 14px 18px 16px 20px;background:rgba(255,255,255,.54);border:1px solid rgba(90,34,53,.06);padding:10px 11px;overflow:hidden}
.detail b{display:block;font-size:9px;line-height:1.1;letter-spacing:.16em;text-transform:uppercase;color:var(--copper);font-weight:900;margin-bottom:5px}
.detail span{display:block;font-size:12.5px;line-height:1.42;color:var(--ink-soft);overflow-wrap:anywhere}
.advice{margin-top:10px;display:grid;gap:8px}
.callout{border-radius:16px 20px 14px 20px / 16px 18px 18px 14px;padding:11px 12px;font-size:12.5px;line-height:1.5;color:var(--ink-soft);border:1px solid rgba(90,34,53,.09);background:rgba(255,255,255,.42);box-shadow:inset 0 1px 0 rgba(255,255,255,.74)}
.callout b{color:var(--ink);font-weight:900}
.callout.alert{background:rgba(147,51,71,.06);border-color:rgba(147,51,71,.10)}
.callout.swap{background:rgba(40,83,73,.07);border-color:rgba(40,83,73,.10)}
.utility-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.utility-card{background:linear-gradient(180deg,rgba(255,252,247,.92),rgba(248,241,232,.84));border:1px solid rgba(255,255,255,.28);box-shadow:var(--shadow-soft);backdrop-filter:blur(9px);border-radius:26px 34px 22px 38px / 22px 30px 36px 26px;padding:16px;overflow:visible}
.utility-card:nth-child(even){border-radius:34px 24px 38px 22px / 26px 36px 22px 30px}
.utility-card h3{margin:0 0 10px;font-family:var(--display);font-size:26px;line-height:1;font-weight:600;color:var(--oxblood);overflow-wrap:anywhere;letter-spacing:-.03em}
.mini{margin:0 0 12px}
.utility-card dl{display:grid;gap:8px;margin:12px 0 0}
.row{display:grid;grid-template-columns:86px minmax(0,1fr);gap:8px;align-items:start}
dt{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.15em;color:var(--copper)}
dd{margin:0;font-size:12.4px;line-height:1.42;color:var(--ink-soft);overflow-wrap:anywhere}
.notes{margin-top:22px}
.note-box{width:100%;min-height:82px;resize:vertical;border:0;outline:0;border-radius:22px 30px 18px 28px / 18px 24px 26px 20px;padding:15px 16px;background:rgba(255,250,245,.86);box-shadow:var(--shadow-soft);font-size:14px;line-height:1.5;color:var(--ink-soft)}
.note-box::placeholder{color:rgba(92,68,67,.56)}
.footer{padding:34px 0 10px;text-align:center;color:var(--oxblood);font-family:var(--serif);font-style:italic;font-size:17px}
@media(max-width:640px){.utility-grid{grid-template-columns:1fr}.row{grid-template-columns:1fr;gap:2px}}
@media(max-width:570px){.topline{grid-template-columns:1fr;gap:14px;padding-right:16px}.sensitive-toggle{justify-self:start}.step-card{padding:16px}.card-main{grid-template-columns:1fr}.check{position:absolute;right:14px;top:14px;width:34px;height:34px;border-radius:14px}.step-top{padding-right:43px;display:block}.step-meta{margin-bottom:10px;max-width:100%}.chips{justify-content:flex-start;width:100%;max-width:100%}.detail-grid{grid-template-columns:1fr}.section-head{align-items:flex-start;flex-direction:column}.section-badge{align-self:flex-start}.app-head::before{border-radius:34px 42px 30px 46px / 28px 34px 42px 30px}}
@media(max-width:420px){.skinstate{grid-template-columns:repeat(2,minmax(0,1fr))}.statebtn{min-height:38px}.summary-top{display:block}.mode-pill{margin-top:10px}.dayname{font-size:clamp(32px,11vw,44px)}h1{font-size:clamp(38px,13vw,56px)}.panel{border-radius:28px 34px 24px 36px / 24px 30px 36px 28px}.day-summary{padding:20px 18px}}
@media(max-width:390px){.daybtn{min-height:48px;font-size:12px}.days{gap:5px}.sensitive-toggle{font-size:0;padding:10px}.sensitive-toggle::after{content:"sensível";font-size:10px;letter-spacing:.08em}.chip,.goalchip,.toolchip{font-size:8.5px;padding:6px 8px}.weeknav{padding-top:10px;padding-bottom:10px}.conflict{padding:12px}.topline{padding-left:14px;padding-right:14px}}
@media(max-width:360px){.row{grid-template-columns:1fr}.product{font-size:24px}.utility-card h3{font-size:23px}.panel{padding:15px}}
</style>
</head>
<body>
<div class="app">
  <header class="app-head">
    <div class="topline">
      <div class="titleblock"><div class="kicker">skincare diário</div><h1><span>Ritual</span><span>Semanal</span></h1></div>

Retinol 0.3 quando quiser renovação mais suave", "goal": "renovação, poros, textura, niacinamida e hidratação"}, {"product": "Numbuzin No.3 Bifida Bakuchiol Serum", "tags": ["renovação", "barreira"], "freq": "alternativa suave, 1x/semana", "area": "rosto todo se tolerado", "avoid": "mesma noite de retinol/RetrinAL/ácidos/Azelan", "fit": "usar na quinta no lugar do retinol quando quiser textura com menos agressão", "goal": "textura, viço, barreira e renovação mais gentil"}, {"product": "Etat Pur / NAOS Ácido Salicílico BHA 2%", "tags": ["poros", "zona T"], "freq": "1x/semana fixo; máximo 2x se pele muito estável", "area": "só zona T", "avoid": "bochechas, rosácea ativa, descamação ou junto de Azelan/retinol/glicólico/pads", "fit": "quarta à noite; se usar pad quinzenal, pule o BHA naquela semana", "goal": "filamentos sebáceos, cravos, poros e oleosidade"}, {"product": "Curativo hidrocoloide Needs", "tags": ["pontual", "acne"], "freq": "sempre que houver espinha com ponta ou vontade de cutucar", "area": "em cima da espinha limpa e seca", "avoid": "por cima de creme/óleo ou ferida muito irritada", "fit": "pode entrar à noite no lugar de Benzac quando a pele estiver sensível", "goal": "proteger a espinha, evitar manipulação e ajudar cicatrização visual"}];
const tagClass={'FPS':'fps','barreira':'barreira','ativo':'ativo','olhos':'olhos','olheiras':'olhos','zona T':'zt','pontual':'pontual','viço':'vico','rosto todo':'','bochechas':'barreira','linhas':'vico','poros':'zt','acne':'ativo','cautela':'ativo','firmeza':'vico','calma':'barreira','ferramenta':'ferramenta','opcional':'opcional','ritual':'opcional','EMS':'ferramenta','reparo':'barreira','toque seco':'fps','textura':'ativo','renovação':'ativo','manchas':'ativo','PDRN':'vico','Azelan':'ativo'};
let selected=localStorage.getItem('ritual-selected-day-v4')||today;
let sensitive=JSON.parse(localStorage.getItem('ritual-sensitive-days-v4')||'{}');
let checks=JSON.parse(localStorage.getItem('ritual-checks-v4')||'{}');
let skin=JSON.parse(localStorage.getItem('ritual-skin-state-v4')||'{}');
const skinOptions=[['estavel','estável'],['oleosa','oleosa'],['vermelha','vermelha'],['repuxando','repuxando']];
const $=sel=>document.querySelector(sel); const el=(tag,cls)=>{const n=document.createElement(tag); if(cls)n.className=cls; return n;};
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function slug(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}
function normalizeItems(items){return items.map((it,i)=>{if(!it.id)it.id=slug(it.kind+'-'+it.product+'-'+i); return it;})};
function modeKey(){return sensitive[selected]?'sens':'normal'} function routine(){return sensitive[selected]?SENSITIVE:ROUTINES[selected]} function allItems(){const r=routine(); return [...normalizeItems(r.am),...normalizeItems(r.pm)];} function checkKey(item){return `${selected}|${modeKey()}|${item.id}`;}
function save(){localStorage.setItem('ritual-selected-day-v4',selected);localStorage.setItem('ritual-sensitive-days-v4',JSON.stringify(sensitive));localStorage.setItem('ritual-checks-v4',JSON.stringify(checks));localStorage.setItem('ritual-skin-state-v4',JSON.stringify(skin));}
function renderDays(){const box=$('#days'); box.innerHTML=''; dayOrder.forEach(d=>{const b=el('button','daybtn'+(d===selected?' active':'')+(sensitive[d]?' sens':'')); b.type='button'; b.innerHTML=`${dayShort[d]}<span class="dot"></span>`; b.setAttribute('aria-pressed',d===selected?'true':'false'); b.onclick=()=>{selected=d;save();render();window.scrollTo({top:0,behavior:'smooth'});}; box.appendChild(b);});}
function renderToggle(){const on=!!sensitive[selected]; const btn=$('#sensitiveToggle'); btn.classList.toggle('on',on); btn.setAttribute('aria-pressed',on?'true':'false'); $('#sensitiveNote').classList.toggle('show',on); btn.onclick=()=>{sensitive[selected]=!sensitive[selected];save();render();};}
function toolList(r){return [...r.am,...r.pm].filter(x=>x.type==='tool').map(x=>x.product.replace('Máscara facial com esferas em gel','Máscara gel').replace('Massageador facial 3D roller','3D roller')).slice(0,4);}
function renderSummary(){const r=routine(); const state=skin[selected]||'estavel'; const tip=state==='vermelha'||state==='repuxando'?'Pele sinalizando cautela: considere ligar o Modo Sensível neste dia.':state==='oleosa'?'Zona T oleosa: use camadas finas e foque nariz, queixo e testa.':'Pele estável: seguir a rotina tratativa do dia.'; $('#summary').innerHTML=`<div class="summary-top"><div><h2 class="dayname">${esc(dayNames[selected])}</h2></div><span class="mode-pill ${esc(r.level)}">${esc(r.intensity)}</span></div><p class="focusline">${esc(r.focus)}</p><div class="goalchips">${r.goals.map(g=>`<span class="goalchip">${esc(g)}</span>`).join('')}</div><div class="conflict"><span class="orb"></span><span><b>Alerta inteligente:</b> ${esc(r.conflict)}<br><b>Leitura da pele:</b> ${esc(tip)}</span></div><div class="progress-row"><div class="progressbar"><span id="progressFill"></span></div><div class="progress-text" id="progressText">0/0</div></div>`;}
function renderSkinState(){const box=$('#skinState'); box.innerHTML=''; const current=skin[selected]||'estavel'; skinOptions.forEach(([id,label])=>{const b=el('button','statebtn'+(current===id?' active':'')); b.type='button'; b.textContent=label; b.onclick=()=>{skin[selected]=id;save();renderSummary();renderSkinState();}; box.appendChild(b);});}
function chipHtml(t){const cls=tagClass[t]||'';return `<span class="chip ${cls}">${esc(t)}</span>`}
function renderStepCard(item,index){if(!item.id)item.id=slug(item.kind+'-'+item.product+'-'+index); const done=!!checks[checkKey(item)]; const article=el('article','step-card '+(item.type==='tool'?'tool ':'')+(done?'done':'')); article.tabIndex=0; article.setAttribute('role','button'); article.setAttribute('aria-pressed',done?'true':'false'); const labels=item.type==='tool'?['Frequência','Onde usar','Como usar','Objetivo']:['Quantidade','Onde usar','Como usar','Resultado']; article.innerHTML=`<div class="card-main"><div class="check" aria-hidden="true"></div><div class="step-content"><div class="step-top"><div class="step-meta"><span class="step-num">${String(index+1).padStart(2,'0')}</span><span class="step-kind">${esc(item.kind)}</span></div><div class="chips">${item.tags.map(chipHtml).join('')}</div></div><h3 class="product">${esc(item.product)}</h3><p class="goal">${esc(item.goal)}</p><div class="detail-grid"><div class="detail"><b>${labels[0]}</b><span>${esc(item.qty)}</span></div><div class="detail"><b>${labels[1]}</b><span>${esc(item.area)}</span></div><div class="detail"><b>${labels[2]}</b><span>${esc(item.how)}</span></div><div class="detail"><b>${labels[3]}</b><span>${esc(item.effect)}</span></div></div><div class="advice"><div class="callout"><b>${item.type==='tool'?'Com qual produto combinar':'Por que hoje'}:</b> ${esc(item.why)}</div>${item.alert?`<div class="callout alert"><b>${item.type==='tool'?'Não usar se':'Atenção'}:</b> ${esc(item.alert)}</div>`:''}${item.swap?`<div class="callout swap"><b>Troque se precisar:</b> ${esc(item.swap)}</div>`:''}</div></div></div>`; const toggle=()=>{checks[checkKey(item)]=!checks[checkKey(item)];save();renderRoutine();}; article.onclick=toggle; article.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle();}}; return article;}
function sectionBlock(title,subtitle,items,badge){const s=el('section','section'); s.innerHTML=`<div class="section-head"><div><h2>${esc(title)}</h2><p>${esc(subtitle)}</p></div><span class="section-badge">${esc(badge)}</span></div>`; const stack=el('div','card-stack'); normalizeItems(items).forEach((it,i)=>stack.appendChild(renderStepCard(it,i))); s.appendChild(stack); return s;}
function utilityCard(item){const c=el('article','utility-card'); c.innerHTML=`<div class="mini">${item.tags.map(chipHtml).join('')}</div><h3>${esc(item.product)}</h3><dl><div class="row"><dt>Frequência</dt><dd>${esc(item.freq)}</dd></div><div class="row"><dt>Onde</dt><dd>${esc(item.area)}</dd></div><div class="row"><dt>Evitar</dt><dd>${esc(item.avoid)}</dd></div><div class="row"><dt>Encaixe</dt><dd>${esc(item.fit)}</dd></div><div class="row"><dt>Objetivo</dt><dd>${esc(item.goal)}</dd></div></dl>`; return c;}
function eventualBlock(){const s=el('section','section'); s.innerHTML=`<div class="section-head"><div><h2>Cuidados Eventuais</h2><p>Use com estratégia: quinzenal, pontual ou como substituição segura.</p></div><span class="section-badge">ajustes</span></div>`; const grid=el('div','utility-grid'); EVENTUALS.forEach(x=>grid.appendChild(utilityCard(x))); s.appendChild(grid); return s;}
function renderRoutine(){const r=routine(); const main=$('#routine'); main.innerHTML=''; main.appendChild(sectionBlock('Rotina Matinal','limpeza, olhos, ferramentas leves, hidratação e FPS',r.am,`${r.am.length} passos`)); main.appendChild(sectionBlock('Rotina Noturna','limpeza dupla, tratamento do dia, ferramentas quando seguras e barreira',r.pm,`${r.pm.length} passos`)); main.appendChild(eventualBlock()); renderNote(); updateProgress();}
function updateProgress(){const items=allItems(); const total=items.length; const done=items.filter(i=>checks[checkKey(i)]).length; const pct=total?Math.round(done/total*100):0; const f=$('#progressFill'),t=$('#progressText'); if(f)f.style.width=pct+'%'; if(t)t.textContent=`${done}/${total}`;}
function renderNote(){const n=$('#noteBox'); const key='ritual-note-v4-'+selected; n.value=localStorage.getItem(key)||''; n.oninput=()=>localStorage.setItem(key,n.value);}
function render(){renderDays();renderToggle();renderSummary();renderSkinState();renderRoutine();save();}
render();
</script>
